<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" font-family="'DM Sans', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3320"/>
      <stop offset="100%" stop-color="#0f1f12"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b45a"/>
      <stop offset="100%" stop-color="#a8893a"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a9e5c"/>
      <stop offset="100%" stop-color="#2d6e3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <rect x="12" y="12" width="376" height="536" rx="8" fill="none" stroke="#3a7d44" stroke-width="2" opacity="0.6"/>
  <rect x="16" y="16" width="368" height="528" rx="6" fill="none" stroke="#c9a94e" stroke-width="1" opacity="0.4"/>

  <!-- Background leaf pattern (subtle) -->
  <g opacity="0.08">
    <ellipse cx="320" cy="80" rx="80" ry="140" fill="#4a9e5c" transform="rotate(-30 320 80)"/>
    <ellipse cx="80" cy="450" rx="70" ry="130" fill="#4a9e5c" transform="rotate(20 80 450)"/>
    <ellipse cx="350" cy="400" rx="60" ry="110" fill="#4a9e5c" transform="rotate(-15 350 400)"/>
  </g>

  <!-- Stylized elephant silhouette (center-stage) -->
  <g transform="translate(200, 300)" opacity="0.9">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="95" ry="70" fill="#2d5a36"/>
    <!-- Head -->
    <ellipse cx="-55" cy="-30" rx="55" ry="48" fill="#2d5a36"/>
    <!-- Trunk -->
    <path d="M -95 -10 Q -130 20 -120 60 Q -115 80 -100 75 Q -88 73 -92 55 Q -100 30 -72 10" fill="#2d5a36"/>
    <!-- Ear -->
    <ellipse cx="-60" cy="-30" rx="35" ry="42" fill="#234830" opacity="0.7"/>
    <!-- Tusk -->
    <path d="M -98 -18 Q -120 -25 -118 -10 Q -116 2 -98 -2" fill="#c9a94e" stroke="#a8893a" stroke-width="1"/>
    <!-- Eye -->
    <circle cx="-72" cy="-38" r="5" fill="#c9a94e"/>
    <circle cx="-72" cy="-38" r="2.5" fill="#1a3320"/>
    <!-- Legs -->
    <rect x="-60" y="78" width="22" height="45" rx="10" fill="#234830"/>
    <rect x="-25" y="82" width="22" height="42" rx="10" fill="#234830"/>
    <rect x="15" y="80" width="22" height="44" rx="10" fill="#234830"/>
    <rect x="50" y="76" width="22" height="48" rx="10" fill="#234830"/>
    <!-- Tail -->
    <path d="M 90 30 Q 120 25 115 55 Q 112 65 105 60" fill="none" stroke="#234830" stroke-width="5" stroke-linecap="round"/>
    <!-- Highlight -->
    <ellipse cx="-20" cy="-10" rx="40" ry="25" fill="#4a9e5c" opacity="0.25"/>
  </g>

  <!-- Stars / conservation points decorative -->
  <g fill="#c9a94e" opacity="0.7">
    <circle cx="50" cy="150" r="2.5"/>
    <circle cx="340" cy="170" r="2"/>
    <circle cx="70" cy="380" r="2"/>
    <circle cx="360" cy="350" r="2.5"/>
    <circle cx="180" cy="490" r="2"/>
    <circle cx="220" cy="80" r="2"/>
  </g>

  <!-- Decorative bar top -->
  <rect x="30" y="48" width="340" height="4" rx="2" fill="url(#goldGrad)" opacity="0.8"/>

  <!-- Game title: ARK NOVA -->
  <text x="200" y="138" text-anchor="middle" font-size="52" font-weight="700" letter-spacing="6"
        fill="url(#goldGrad)" filter="url(#glow)">ARK NOVA</text>

  <!-- Subtitle rule line -->
  <line x1="60" y1="150" x2="340" y2="150" stroke="#c9a94e" stroke-width="1" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="200" y="172" text-anchor="middle" font-size="13" fill="#8fbc9e" letter-spacing="2">ZOO BUILDING · CONSERVATION</text>

  <!-- Bottom info bar -->
  <rect x="30" y="490" width="340" height="48" rx="4" fill="#0a1a0d" opacity="0.7"/>
  <text x="200" y="511" text-anchor="middle" font-size="10" fill="#8fbc9e" letter-spacing="1">MATHIAS WIGGE  ·  CAPSTONE GAMES  ·  1–4 PLAYERS</text>
  <text x="200" y="527" text-anchor="middle" font-size="10" fill="#c9a94e" letter-spacing="1">90–150 MIN  ·  AGE 14+</text>

  <!-- Decorative bar bottom -->
  <rect x="30" y="480" width="340" height="4" rx="2" fill="url(#goldGrad)" opacity="0.8"/>

  <!-- Small leaf accents -->
  <g fill="url(#leafGrad)" opacity="0.5">
    <ellipse cx="45" cy="162" rx="8" ry="4" transform="rotate(-45 45 162)"/>
    <ellipse cx="355" cy="162" rx="8" ry="4" transform="rotate(45 355 162)"/>
  </g>
</svg>
